name: Expo Update

on:
  push:
    branches:
      - main # Jalankan otomatis setiap push ke branch main

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./mobile
        run: npm install

      - name: Publish update
        working-directory: ./mobile
        run: eas update --branch preview --message "GitHub Actions Auto Update - ${{ github.event.head_commit.message }}"
